{% extends "base.html" %}
{% block title %}Publish Update - Admin Panel{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <h2 class="fw-bold mb-4">Publish Update</h2>
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
          <form method="POST">
            <div class="mb-3"><label class="form-label fw-medium">Title</label><input type="text" name="title" class="form-control" required/></div>
            <div class="row g-3 mb-3">
              <div class="col-md-6"><label class="form-label fw-medium">Version</label><input type="text" name="version" class="form-control" placeholder="v1.0.0"/></div>
              <div class="col-md-6">
                <label class="form-label fw-medium">Type</label>
                <select name="type" class="form-select">
                  <option value="website">Website</option>
                  <option value="bot">Bot</option>
                  <option value="feature">Feature</option>
                  <option value="bugfix">Bug Fix</option>
                </select>
              </div>
            </div>
            <div class="mb-4"><label class="form-label fw-medium">Content</label><textarea name="content" class="form-control" rows="5"></textarea></div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">Publish</button>
              <a href="{{ url_for('admin.updates') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
