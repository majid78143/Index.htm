{% extends "base.html" %}
{% block title %}{{ 'Edit' if item else 'Add' }} FAQ - Admin Panel{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <h2 class="fw-bold mb-4">{{ 'Edit' if item else 'Add' }} FAQ</h2>
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
          <form method="POST">
            <div class="mb-3"><label class="form-label fw-medium">Question</label><input type="text" name="question" class="form-control" value="{{ item.question if item else '' }}" required/></div>
            <div class="mb-3"><label class="form-label fw-medium">Answer</label><textarea name="answer" class="form-control" rows="4" required>{{ item.answer if item else '' }}</textarea></div>
            <div class="mb-4"><label class="form-label fw-medium">Order</label><input type="number" name="order" class="form-control" value="{{ item.order if item else 99 }}"/></div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">{{ 'Update' if item else 'Add' }}</button>
              <a href="{{ url_for('admin.faq') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
