{% extends "base.html" %}
{% block title %}Permissions - Admin Panel{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <h2 class="fw-bold mb-4">Edit Permissions — <code>{{ uid }}</code></h2>
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
          <form method="POST">
            <div class="row g-3 mb-4">
              {% for perm in all_perms %}
              <div class="col-6">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="permissions" value="{{ perm }}" id="perm_{{ perm }}" {% if perm in current %}checked{% endif %}/>
                  <label class="form-check-label" for="perm_{{ perm }}">{{ perm.replace('_',' ')|title }}</label>
                </div>
              </div>
              {% endfor %}
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">Save Permissions</button>
              <a href="{{ url_for('admin.admins') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
