{% extends "base.html" %}
{% block title %}Edit Page - Admin Panel{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <h2 class="fw-bold mb-4">Edit Page: /{{ page.slug }}</h2>
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
          <form method="POST">
            <div class="mb-3"><label class="form-label fw-medium">Title</label><input type="text" name="title" class="form-control" value="{{ page.title or '' }}" required/></div>
            <div class="mb-4"><label class="form-label fw-medium">Content (HTML supported)</label><textarea name="content" class="form-control" rows="12">{{ page.content or '' }}</textarea></div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">Save Page</button>
              <a href="{{ url_for('admin.pages') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
