{% extends "base.html" %}
{% block title %}FAQ - Admin Panel{% endblock %}

{% block content %}
<div class="container-fluid py-4 px-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0"><i class="bi bi-question-circle-fill text-primary me-2"></i>FAQ Manager</h2>
    <div class="d-flex gap-2">
      <a href="{{ url_for('admin.create_faq') }}" class="btn btn-primary btn-sm"><i class="bi bi-plus me-1"></i>Add FAQ</a>
      <a href="{{ url_for('admin.admin_panel') }}" class="btn btn-outline-secondary btn-sm">&larr; Back</a>
    </div>
  </div>
  <div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="bg-light"><tr><th class="px-4 py-3">Question</th><th>Order</th><th>Actions</th></tr></thead>
        <tbody>
          {% for f in faq %}
          <tr>
            <td class="px-4 py-3 fw-medium">{{ f.question }}</td>
            <td class="py-3">{{ f.order }}</td>
            <td class="py-3 d-flex gap-1">
              <a href="{{ url_for('admin.edit_faq', fid=f.id) }}" class="btn btn-sm btn-outline-primary">Edit</a>
              <form method="POST" action="{{ url_for('admin.delete_faq', fid=f.id) }}" onsubmit="return confirm('Delete?')">
                <button class="btn btn-sm btn-outline-danger">Delete</button>
              </form>
            </td>
          </tr>
          {% else %}
          <tr><td colspan="3" class="text-center text-muted py-5">No FAQ items yet.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
