{% extends "base.html" %}
{% block title %}Media - Admin Panel{% endblock %}

{% block content %}
<div class="container-fluid py-4 px-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0"><i class="bi bi-images text-success me-2"></i>Media Library</h2>
    <a href="{{ url_for('admin.admin_panel') }}" class="btn btn-outline-secondary btn-sm">&larr; Back</a>
  </div>

  <div class="card border-0 shadow-sm rounded-4 mb-4">
    <div class="card-body p-4">
      <h5 class="fw-bold mb-3">Add Media (URL)</h5>
      <form method="POST" action="{{ url_for('admin.add_media') }}" class="row g-3">
        <div class="col-md-5"><input type="url" name="url" class="form-control" placeholder="https://... direct image URL" required/></div>
        <div class="col-md-3"><input type="text" name="label" class="form-control" placeholder="Label (e.g. Logo)"/></div>
        <div class="col-md-2">
          <select name="media_type" class="form-select">
            <option value="image">Image</option>
            <option value="logo">Logo</option>
            <option value="banner">Banner</option>
            <option value="favicon">Favicon</option>
            <option value="hero">Hero</option>
          </select>
        </div>
        <div class="col-md-2"><button type="submit" class="btn btn-success w-100">Add Media</button></div>
      </form>
    </div>
  </div>

  <div class="row g-3">
    {% for item in media %}
    <div class="col-sm-6 col-md-4 col-lg-3">
      <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
        <img src="{{ item.url }}" class="card-img-top" style="height:150px;object-fit:cover;" onerror="this.src='https://placehold.co/300x150?text=Image'"/>
        <div class="card-body p-3">
          <div class="fw-medium small mb-1">{{ item.label or 'Untitled' }}</div>
          <span class="badge bg-secondary mb-2">{{ item.type }}</span>
          <div class="d-flex gap-2">
            <a href="{{ item.url }}" target="_blank" class="btn btn-sm btn-outline-primary flex-grow-1">View</a>
            <form method="POST" action="{{ url_for('admin.delete_media', mid=item.id) }}" onsubmit="return confirm('Delete?')">
              <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
            </form>
          </div>
        </div>
      </div>
    </div>
    {% else %}
    <div class="col-12 text-center text-muted py-5">
      <i class="bi bi-images fs-1 opacity-25 d-block mb-3"></i>No media uploaded yet.
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
