{% extends "base.html" %}
{% block title %}{{ 'Edit' if announcement else 'Create' }} Announcement{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <h2 class="fw-bold mb-4">{{ 'Edit' if announcement else 'Create' }} Announcement</h2>
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
          <form method="POST">
            <div class="mb-3">
              <label class="form-label fw-medium">Title</label>
              <input type="text" name="title" class="form-control" value="{{ announcement.title if announcement else '' }}" required/>
            </div>
            <div class="mb-3">
              <label class="form-label fw-medium">Content</label>
              <textarea name="content" class="form-control" rows="5" required>{{ announcement.content if announcement else '' }}</textarea>
            </div>
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label fw-medium">Type</label>
                <select name="type" class="form-select">
                  {% for t in ['info','important','maintenance','update'] %}
                  <option {% if announcement and announcement.type == t %}selected{% endif %}>{{ t }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-md-6 d-flex align-items-end">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="pinned" id="pinned" {% if announcement and announcement.pinned %}checked{% endif %}/>
                  <label class="form-check-label fw-medium" for="pinned">Pin this announcement</label>
                </div>
              </div>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">{{ 'Update' if announcement else 'Publish' }}</button>
              <a href="{{ url_for('admin.announcements') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
