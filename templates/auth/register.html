{% extends "base.html" %}
{% block title %}Register - {{ website_name }}{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <h2 class="fw-bold">Create Account</h2>
            <p class="text-muted">Join {{ website_name }} today</p>
          </div>
          <form method="POST">
            <div class="mb-3">
              <label class="form-label fw-medium">Full Name</label>
              <input type="text" name="name" class="form-control" placeholder="Your Name" required/>
            </div>
            <div class="mb-3">
              <label class="form-label fw-medium">Email Address</label>
              <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
            </div>
            <div class="mb-3">
              <label class="form-label fw-medium">Password</label>
              <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" required minlength="6"/>
            </div>
            <div class="mb-4">
              <label class="form-label fw-medium">Confirm Password</label>
              <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required/>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
            </div>
          </form>
          <p class="text-center mt-4 text-muted small mb-0">
            Already have an account? <a href="{{ url_for('auth.login_page') }}" class="fw-medium">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
