{% extends "base.html" %}
{% block title %}Forgot Password - {{ website_name }}{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <div class="bg-warning bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
              <i class="bi bi-key text-warning fs-2"></i>
            </div>
            <h2 class="fw-bold">Reset Password</h2>
            <p class="text-muted">Enter your email and we'll send a reset link</p>
          </div>
          <form method="POST">
            <div class="mb-4">
              <label class="form-label fw-medium">Email Address</label>
              <input type="email" name="email" class="form-control form-control-lg" placeholder="you@example.com" required/>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg">Send Reset Link</button>
            </div>
          </form>
          <p class="text-center mt-4 text-muted small mb-0">
            <a href="{{ url_for('auth.login_page') }}" class="fw-medium">&larr; Back to Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
