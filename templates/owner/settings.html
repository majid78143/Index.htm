{% extends "base.html" %}
{% block title %}Site Settings - Owner Panel{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-gear-fill text-primary me-2"></i>Site Settings</h2>
        <a href="{{ url_for('owner.owner_panel') }}" class="btn btn-outline-secondary btn-sm">&larr; Back</a>
      </div>
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
          <form method="POST">
            <div class="mb-3"><label class="form-label fw-medium">Website Name</label><input type="text" name="website_name" class="form-control" value="{{ settings.website_name or '' }}"/></div>
            <div class="mb-3"><label class="form-label fw-medium">Description</label><textarea name="website_description" class="form-control" rows="2">{{ settings.website_description or '' }}</textarea></div>
            <div class="row g-3 mb-3">
              <div class="col-md-6"><label class="form-label fw-medium">Primary Color</label><input type="color" name="primary_color" class="form-control form-control-color" value="{{ settings.primary_color or '#0d6efd' }}"/></div>
              <div class="col-md-6"><label class="form-label fw-medium">Secondary Color</label><input type="color" name="secondary_color" class="form-control form-control-color" value="{{ settings.secondary_color or '#6c757d' }}"/></div>
            </div>
            <div class="mb-3"><label class="form-label fw-medium">Footer Text</label><input type="text" name="footer_text" class="form-control" value="{{ settings.footer_text or '' }}"/></div>
            <div class="mb-4"><label class="form-label fw-medium">Custom CSS</label><textarea name="custom_css" class="form-control font-monospace" rows="5" placeholder="/* Custom CSS here */">{{ settings.custom_css or '' }}</textarea></div>
            <div class="form-check form-switch mb-4">
              <input class="form-check-input" type="checkbox" name="maintenance_mode" {% if settings.maintenance_mode %}checked{% endif %} role="switch"/>
              <label class="form-check-label fw-medium">Maintenance Mode</label>
            </div>
            <button type="submit" class="btn btn-primary">Save Settings</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
